security:
    # 👑 HIÉRARCHIE DES RÔLES : L'Admin hérite de TOUS les droits des autres services !
    role_hierarchy:
        ROLE_ADMIN: [ROLE_COORDON, ROLE_STOCK, ROLE_COMPTA, ROLE_GUERITE, ROLE_USER]

    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: form_login
            
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                username_parameter: email
                password_parameter: password

            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true

    # Note: Only the *first* matching rule is applied
    access_control:
        # 🔐 Sécurité globale au niveau de l'URL pour ton tableau de bord
        #- { path: ^/dashboard, roles: [ROLE_USER, ROLE_COORDON, ROLE_STOCK, ROLE_COMPTA, ROLE_GUERITE, ROLE_ADMIN] }
        - { path: ^/user, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10